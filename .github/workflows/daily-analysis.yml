name: Daily AI Investment Analysis

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: "Stock symbol"
        required: false
        default: "2603.TW"
      symbols:
        description: "Comma-separated symbols. Overrides symbol when provided."
        required: false
        default: ""
      mode:
        description: "general or personalized"
        required: false
        default: "general"
      model:
        description: "OpenAI model override"
        required: false
        default: ""
      send_email:
        description: "Send email report"
        required: false
        default: "true"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: daily-analysis-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Print trigger diagnostics
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          echo "input_symbol=${{ github.event.inputs.symbol }}"
          echo "input_symbols=${{ github.event.inputs.symbols }}"
          echo "input_mode=${{ github.event.inputs.mode }}"
          echo "input_model=${{ github.event.inputs.model }}"
          echo "input_send_email=${{ github.event.inputs.send_email }}"
          echo "ref=${{ github.ref }}"
          echo "branch=${{ github.ref_name }}"
          echo "sha=${{ github.sha }}"
          echo "utc_time=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "taipei_time=$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M:%S Asia/Taipei')"

      - name: Check cloud freight database read
        env:
          UPDATE_SUPABASE: ${{ secrets.UPDATE_SUPABASE || 'true' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          READ_SUPABASE_FREIGHT: ${{ secrets.READ_SUPABASE_FREIGHT || 'true' }}
        run: |
          python - <<'PY'
          import json
          from backend.integrations.supabase_client import diagnostic_status
          from backend.services.freight_route_store import latest_route_row_from_supabase

          status = diagnostic_status()
          row = latest_route_row_from_supabase()
          print("cloud_supabase_configured=" + str(status.get("configured")))
          print("cloud_supabase_host=" + str(status.get("host")))
          print("cloud_supabase_host_looks_valid=" + str(status.get("host_looks_valid")))
          print("cloud_freight_routes_latest_found=" + str(bool(row)))
          if row:
              safe_row = {
                  "date": row.get("date"),
                  "scfi": row.get("scfi"),
                  "weekly_change": row.get("weekly_change"),
                  "scfi_streak_weeks": row.get("scfi_streak_weeks"),
                  "us_west": row.get("us_west"),
                  "us_west_weekly_change": row.get("us_west_weekly_change"),
                  "us_east": row.get("us_east"),
                  "us_east_weekly_change": row.get("us_east_weekly_change"),
                  "europe": row.get("europe"),
                  "europe_weekly_change": row.get("europe_weekly_change"),
                  "source": row.get("source"),
                  "quality": row.get("quality"),
                  "storage_source": row.get("_storage_source"),
              }
              print("cloud_freight_routes_latest=" + json.dumps(safe_row, ensure_ascii=False))
          PY

      - name: Run scheduled analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_TIMEOUT_SECONDS: "360"
          OPENAI_MAX_OUTPUT_TOKENS: "6000"
          REQUEST_TIMEOUT_SECONDS: "45"
          FREIGHT_CACHE_MAX_DAYS: "21"
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_STARTTLS: ${{ secrets.SMTP_STARTTLS }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          UPDATE_GOOGLE_SHEET: ${{ secrets.UPDATE_GOOGLE_SHEET || 'true' }}
          GOOGLE_SHEET_REQUIRED: ${{ secrets.GOOGLE_SHEET_REQUIRED || 'false' }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_WORKSHEET: ${{ secrets.GOOGLE_SHEET_WORKSHEET || 'analysis_log' }}
          UPDATE_SUPABASE: ${{ secrets.UPDATE_SUPABASE || 'true' }}
          SUPABASE_REQUIRED: ${{ secrets.SUPABASE_REQUIRED || 'false' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          READ_SUPABASE_FREIGHT: ${{ secrets.READ_SUPABASE_FREIGHT || 'true' }}
          SCFI_AUTO_UPDATE_CLOUD: ${{ secrets.SCFI_AUTO_UPDATE_CLOUD || 'true' }}
          SCFI_AUTO_UPDATE_LOCAL_CSV: ${{ secrets.SCFI_AUTO_UPDATE_LOCAL_CSV || 'false' }}
          VALIDATE_PREDICTIONS: ${{ secrets.VALIDATE_PREDICTIONS || 'true' }}
          RUN_REPORT_AUDIT: ${{ secrets.RUN_REPORT_AUDIT || 'true' }}
          REPORT_SYMBOL: ${{ github.event.inputs.symbol || '2603.TW' }}
          REPORT_SYMBOLS: ${{ github.event.inputs.symbols || secrets.REPORT_SYMBOLS }}
          REPORT_MODE: ${{ github.event.inputs.mode || 'general' }}
          REPORT_MODEL: ${{ github.event.inputs.model || secrets.OPENAI_MODEL }}
          SEND_EMAIL: ${{ github.event.inputs.send_email || 'true' }}
        run: python -m backend.jobs.daily_analysis_email

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-analysis-report
          path: data/scheduled_reports/
          if-no-files-found: warn
