name: Schedule Heartbeat Test

on:
  workflow_dispatch:
  schedule:
    # Temporary diagnostic workflow.
    # If this does not show schedule runs, the repository is not receiving GitHub schedule events.
    - cron: "*/5 * * * *"

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Print schedule diagnostics
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          echo "ref=${{ github.ref }}"
          echo "branch=${{ github.ref_name }}"
          echo "sha=${{ github.sha }}"
          echo "actor=${{ github.actor }}"
          echo "repository=${{ github.repository }}"
          echo "utc_time=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "taipei_time=$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M:%S Asia/Taipei')"
